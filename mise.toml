[tools]
# Build tools
cmake = "latest"
ninja = "latest"

[tasks.setup]
description = "Resolve Swift packages for sourcekit-lsp"
run = "swift package resolve"

[tasks.build]
description = "Build the TaigiTelex input method"
run = """
cmake -B build -G Ninja -DARCH=arm64 -DCMAKE_BUILD_TYPE=Release
cmake --build build
"""

[tasks.install]
description = "Install TaigiTelex to ~/Library/Input Methods"
depends = ["build"]
run = "cmake --install build"

[tasks.reload]
description = "Build, install and reload TaigiTelex"
depends = ["install"]
run = "pkill TaigiTelex || true"

[tasks.clean]
description = "Clean build directory"
run = "rm -rf build"

[tasks.format]
description = "Format Swift source files with swiftformat"
run = "xcrun swift-format format --in-place **/*.swift"

[tasks.test]
description = "Run unit tests"
run = "swift test"

[tasks.fuzz]
description = "Run fuzz tests (not included in `swift test`)"
run = "swift run FuzzTests"

[tasks.package]
description = "Build and package TaigiTelex as PKG"
run = "scripts/build_pkg.sh --universal"
