name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-nightly:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install ninja cmake

      - name: Build universal PKG
        run: |
          scripts/build_pkg.sh --universal

      - name: Prepare nightly build artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          mv build/TaigiTelex-*.pkg "build/TaigiTelex-nightly.pkg"
          echo "Renamed package to: TaigiTelex-nightly.pkg"

      - name: Delete existing nightly release
        if: ${{ github.ref == 'refs/heads/main' }}
        run: gh release delete nightly --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move nightly tag to latest commit
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d nightly 2>/dev/null || true
          git tag nightly
          git push origin nightly --force

      - name: Release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: nightly
          generate_release_notes: true
          name: "Nightly Build"
          files: |
            build/TaigiTelex-*.pkg

  build-stable:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install ninja cmake

      - name: Build universal PKG
        run: |
          scripts/build_pkg.sh --universal

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
          generate_release_notes: true
          files: |
            build/TaigiTelex-*.pkg
