name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-nightly:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install ninja cmake

      - name: Build universal PKG
        run: |
          scripts/build_pkg.sh --universal

      - name: Prepare nightly build artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          VERSION=$(cat VERSION)
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_NAME="TaigiTelex-${VERSION}-nightly-${DATE}-${SHORT_SHA}.pkg"
          mv build/TaigiTelex-*.pkg "build/${NEW_NAME}"
          echo "Renamed package to: ${NEW_NAME}"

      - name: Release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          prerelease: true
          name: "Nightly Build"
          files: |
            build/TaigiTelex-*.pkg
